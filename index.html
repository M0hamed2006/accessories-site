<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الإكسسوارات 💖</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #fdf6f0;
            text-align: center;
        }

        header {
            padding: 25px;
        }

        h1 {
            color: #c89b7b;
            margin-bottom: 10px;
        }

        .badge {
            background: #c89b7b;
            color: white;
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin: 5px;
        }

        .section-title {
            margin: 25px 0 10px;
            font-size: 20px;
            color: #333;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            font-size: 15px;
            margin: 5px 0;
        }

        .price {
            color: #c89b7b;
            font-weight: bold;
        }

        button {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            border: none;
            background: #25D366; /* أخضر واتساب 🔥 */
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #1ebe5d;
        }

        .offer {
            background: #fff3e6;
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            border: 2px dashed #c89b7b;
        }
    </style>
</head>

<body>

<header>
    <h1>متجر الإكسسوارات 💖</h1>

    <div class="badge">🔥 عرض محدود</div>
    <div class="badge">خصم أول طلب</div>
</header>

<div class="offer">
    🎁 أول طلب ليك عليه خصم خاص! اطلب دلوقتي قبل ما العرض يخلص 😏
</div>

<!-- أساور -->
<div class="section-title">💫 الأساور</div>
<div class="grid">

    <div class="card">
        <h3>إسوارة أنيقة</h3>
        <p class="price">101</p>
        <button onclick="order(101)">💬 اطلب على واتساب</button>
    </div>

    <div class="card">
        <h3>إسوارة حب</h3>
        <p class="price">102</p>
        <button onclick="order(102)">💬 اطلب على واتساب</button>
    </div>

</div>

<!-- سلاسل -->
<div class="section-title">📿 السلاسل</div>
<div class="grid">

    <div class="card">
        <h3>سلسلة شيك</h3>
        <p class="price">201</p>
        <button onclick="order(201)">💬 اطلب على واتساب</button>
    </div>

</div>

<!-- خواتم -->
<div class="section-title">💍 الخواتم</div>
<div class="grid">

    <div class="card">
        <h3>خاتم هاند ميد</h3>
        <p class="price">301</p>
        <button onclick="order(301)">💬 اطلب على واتساب</button>
    </div>

</div>

<script>
    let phone = "201118618196";

    function order(code) {
        let msg = "السلام عليكم، عايز أطلب المنتج رقم " + code + " مع خصم أول طلب 🔥";
        let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
        window.open(url, "_blank");
    }
</script>

</body>
</html>
